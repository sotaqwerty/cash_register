<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>レジ過不足調整</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449;
    --accent:#38bdf8; --accent2:#0ea5e9;
    --ok:#22c55e; --warn:#f59e0b; --err:#ef4444;
    --text:#e2e8f0; --muted:#94a3b8; --line:#334155;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; justify-content:center;
    padding:12px; line-height:1.5;
  }
  .app{width:100%; max-width:460px;}
  h1{font-size:19px; margin:4px 0 12px; text-align:center; font-weight:700;}
  .card{background:var(--card); border-radius:16px; padding:16px; margin-bottom:12px; border:1px solid var(--line);}
  .label{font-size:14px; color:var(--muted); margin-bottom:6px;}
  .display{
    background:var(--card2); border:2px solid var(--line); border-radius:12px;
    padding:14px 16px; font-size:30px; font-weight:700; text-align:right;
    min-height:34px; letter-spacing:1px; transition:border-color .15s;
  }
  .display.active{border-color:var(--accent);}
  .display .unit{font-size:16px; color:var(--muted); margin-left:4px;}
  .display .ph{color:var(--muted); font-weight:400; font-size:20px;}
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px;}
  .key{
    background:var(--card2); border:none; color:var(--text);
    font-size:24px; font-weight:600; padding:16px 0; border-radius:12px;
    cursor:pointer; user-select:none; transition:background .1s, transform .05s;
  }
  .key:active{background:#3b4c66; transform:scale(.96);}
  .key.util{background:#3a2f2f; color:#fca5a5; font-size:18px;}
  .key.util:active{background:#4a3a3a;}
  .key.sign{background:#2f3a4a; color:var(--accent); font-size:22px;}
  .btn{
    display:block; width:100%; border:none; border-radius:12px;
    padding:15px; font-size:17px; font-weight:700; cursor:pointer; margin-top:12px;
    color:#00121f; background:linear-gradient(180deg,var(--accent),var(--accent2));
  }
  .btn:active{filter:brightness(.92);}
  .btn.secondary{background:none; color:var(--muted); border:1px solid var(--line);}
  .btn:disabled{opacity:.4; cursor:default;}
  .hint{font-size:13px; color:var(--muted); margin-top:8px;}
  .msg{border-radius:10px; padding:10px 12px; font-size:14px; margin-top:10px;}
  .msg.err{background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.4); color:#fca5a5;}
  .msg.warn{background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.4); color:#fcd34d;}
  .cond{background:var(--card2); border-radius:10px; padding:10px 12px; margin-top:8px; font-size:14px;}
  .cond b{color:var(--accent);}
  .modlist{display:flex; gap:8px; flex-wrap:wrap; margin:8px 0;}
  .modchip{background:var(--accent2); color:#00121f; font-weight:700; border-radius:8px; padding:6px 14px; font-size:18px;}
  .result{background:rgba(34,197,94,.10); border:1px solid rgba(34,197,94,.45); border-radius:12px; padding:14px; margin-top:12px;}
  .result h2{margin:0 0 10px; font-size:16px; color:var(--ok);}
  .row{display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed var(--line); font-size:15px;}
  .row:last-child{border-bottom:none;}
  .row .c{color:var(--accent); font-weight:700;}
  .total{margin-top:8px; font-weight:700; text-align:right;}
  .big{font-size:22px; font-weight:800; color:var(--accent);}
  .hidden{display:none;}
  .step-title{font-size:15px; font-weight:700; margin-bottom:8px; display:flex; align-items:center; gap:8px;}
  .step-title .n{background:var(--accent); color:#00121f; width:24px; height:24px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:14px;}
  .footer{text-align:center; color:var(--muted); font-size:12px; margin:8px 0 20px;}
</style>
</head>
<body>
<div class="app">
  <h1>レジ過不足調整計算</h1>

  <!-- STEP 1 -->
  <div class="card" id="card1">
    <div class="step-title"><span class="n">1</span>ズレの額を入力</div>
    <div class="label">不足のときは「−」で符号を反転</div>
    <div class="display active" id="dispA" data-field="a"><span class="ph">0</span></div>
    <div class="keypad" id="padA"></div>
    <button class="btn" id="btnNext">次へ ▶</button>
  </div>

  <!-- STEP 2 -->
  <div class="card hidden" id="card2">
    <div class="step-title"><span class="n">2</span>戻す額を入力</div>
    <div id="condBox"></div>
    <div class="label" style="margin-top:10px;">戻す額（<span id="minB"></span> 円以上）</div>
    <div class="display active" id="dispB" data-field="b"><span class="ph">0</span></div>
    <div class="keypad" id="padB"></div>
    <button class="btn" id="btnCalc">計算する</button>
    <button class="btn secondary" id="btnBack">◀ ズレの額を修正</button>
    <div id="msgB"></div>
  </div>

  <!-- RESULT -->
  <div id="resultBox"></div>

  <button class="btn secondary hidden" id="btnReset">最初からやり直す</button>

  <div class="footer">オフライン動作 / インストール不要</div>
</div>

<script>
"use strict";

/* ===== データ定義（Python版と同一） ===== */
const menuPrices = {
  'メニューA(250円)':250,'メニューB(270円)':270,'メニューC(290円)':290,
  'メニューD(320円)':320,'メニューE(330円)':330,'メニューF(360円)':360,
  'メニューG(380円)':380,'メニューH(390円)':390
};
// 戻し(b)に使える袋
const returnBags = {
  0:{count:0,items:{}},
  3:{count:1,items:{'小(3円)':1}},
  5:{count:1,items:{'大(5円)':1}},
  6:{count:2,items:{'小(3円)':2}},
  8:{count:2,items:{'小(3円)':1,'大(5円)':1}}
};
// 空打ち(c)に使える袋
const addBags = {
  0:{count:0,items:{}},
  3:{count:1,items:{'小(3円)':1}},
  5:{count:1,items:{'大(5円)':1}},
  6:{count:2,items:{'小(3円)':2}},
  8:{count:2,items:{'小(3円)':1,'大(5円)':1}},
  11:{count:3,items:{'小(3円)':2,'大(5円)':1}}
};
// Python互換のmod（負数対応）
const mod = (n,m)=>((n%m)+m)%m;
// 整数キーを挿入順（=昇順）で取り出す
const keysNum = o => Object.keys(o).map(Number);

/* ===== ステップ1のロジック：最適な戻し下一桁を探索 ===== */
function computeOptimal(a){
  const aMod = mod(a,10);
  let bestCost = Infinity;
  let optimalBMods = [];
  const bestBagCombos = {}; // b_mod -> [b_val, c_val]

  for(const bVal of keysNum(returnBags)){
    const bInfo = returnBags[bVal];
    const cMod = mod(aMod + bVal, 10);
    for(const cVal of keysNum(addBags)){
      const cInfo = addBags[cVal];
      if(mod(cVal,10) === cMod){
        const cost = bInfo.count + cInfo.count;
        if(cost < bestCost){
          bestCost = cost;
          optimalBMods = [mod(bVal,10)];
          bestBagCombos[mod(bVal,10)] = [bVal, cVal];
        } else if(cost === bestCost){
          const bm = mod(bVal,10);
          if(!optimalBMods.includes(bm)){
            optimalBMods.push(bm);
            bestBagCombos[bm] = [bVal, cVal];
          }
        }
      }
    }
  }
  optimalBMods.sort((x,y)=>x-y);
  return {optimalBMods, bestBagCombos};
}

/* ===== ステップ2のロジック：構成探索（DP） ===== */
function computePlan(a, b, optimalBMods, bestBagCombos){
  if(b < -a){
    return {ok:false, type:'err',
      msg:`「空打ち額」が自然数になりません。${-a+1} 円以上を入力してください。`};
  }
  const bMod = mod(b,10);
  if(!optimalBMods.includes(bMod)){
    return {ok:false, type:'warn',
      msg:`「戻す額の下一桁」が最適リスト [${optimalBMods.join(', ')}] に含まれていません。再入力してください。`};
  }
  const c = a + b;
  const [bValTarget, cBagVal] = bestBagCombos[bMod];
  const cMenuTarget = c - cBagVal;

  if(cMenuTarget < 0){
    return {ok:false, type:'err',
      msg:`金額が小さすぎます（袋の金額 ${cBagVal} 円を引くとマイナス）。より大きな「戻す額」を入力してください。`, c};
  }

  // DP：10円刻みで最小点数の構成
  const dp = {0:{}};
  for(let i=10; i<=cMenuTarget; i+=10){
    let minItems = Infinity, bestCombo = null;
    for(const name in menuPrices){
      const price = menuPrices[name];
      if(i>=price && (i-price) in dp){
        const combo = Object.assign({}, dp[i-price]);
        combo[name] = (combo[name]||0)+1;
        const cnt = Object.values(combo).reduce((s,v)=>s+v,0);
        if(cnt < minItems){ minItems=cnt; bestCombo=combo; }
      }
    }
    if(bestCombo!==null) dp[i]=bestCombo;
  }

  if(cMenuTarget in dp){
    const finalCombo = Object.assign({}, dp[cMenuTarget]);
    for(const bagName in addBags[cBagVal].items){
      finalCombo[bagName] = addBags[cBagVal].items[bagName];
    }
    let total = 0;
    for(const k in finalCombo) total += finalCombo[k];
    return {ok:true, c, combo:finalCombo, total, cMenuTarget};
  }
  return {ok:false, type:'err', c,
    msg:`袋を引いた残り ${cMenuTarget} 円は現在のメニューでは構成できません。さらに大きな「戻す額」を入力してください。`};
}

/* ===== 袋アイテムを文字列化 ===== */
function bagStr(items){
  const keys = Object.keys(items);
  if(keys.length===0) return 'レジ袋なし';
  return keys.map(k=>`${k} ${items[k]}個`).join('，');
}

/* ================= UI ================= */
const state = {a:'', b:'', active:'a', optimal:null};

function buildPad(container, field){
  const keys = ['1','2','3','4','5','6','7','8','9','±','0','⌫'];
  container.innerHTML='';
  keys.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='key';
    if(k==='⌫') btn.className+=' util';
    if(k==='±') btn.className+=' sign';
    btn.textContent=k;
    btn.addEventListener('click',()=>press(field,k));
    container.appendChild(btn);
  });
}

function press(field,k){
  let v = state[field];
  if(k==='⌫'){
    if(v==='-'||v===''){ v=''; }
    else v = v.slice(0,-1);
  } else if(k==='±'){
    if(v.startsWith('-')) v=v.slice(1);
    else v='-'+v;
  } else { // digit
    if(v==='0') v='';        // leading zero replace
    if(v==='-0') v='-';
    v = v + k;
  }
  state[field]=v;
  render();
}

function fmtDisplay(v){
  if(v===''||v==='-'){
    return `<span class="ph">${v==='-'?'−':'0'}</span>`;
  }
  const n = parseInt(v,10);
  return `${n.toLocaleString('ja-JP')}<span class="unit">円</span>`;
}

function render(){
  document.getElementById('dispA').innerHTML = fmtDisplay(state.a);
  document.getElementById('dispB').innerHTML = fmtDisplay(state.b);
  // btnNext有効化
  const aValid = state.a!=='' && state.a!=='-';
  document.getElementById('btnNext').disabled = !aValid;
}

function parseVal(v){ return parseInt(v||'0',10); }

/* ---- STEP1 -> STEP2 ---- */
document.getElementById('btnNext').addEventListener('click',()=>{
  const a = parseVal(state.a);
  state.optimal = computeOptimal(a);
  const {optimalBMods, bestBagCombos} = state.optimal;

  // 条件表示
  let html = `<div class="label">戻す額の「下一桁」を次のいずれかに:</div>
    <div class="modlist">${optimalBMods.map(m=>`<span class="modchip">${m}</span>`).join('')}</div>
    <div class="label">【戻しの条件】</div>`;
  optimalBMods.forEach(bm=>{
    const [bValTarget] = bestBagCombos[bm];
    const items = returnBags[bValTarget].items;
    html += `<div class="cond">下一桁を <b>${bm}</b> にする場合：${bagStr(items)} が含まれる会計を探す（計 ${bValTarget} 円分）</div>`;
  });
  document.getElementById('condBox').innerHTML = html;
  document.getElementById('minB').textContent = (-a).toLocaleString('ja-JP');

  document.getElementById('card1').classList.add('hidden');
  document.getElementById('card2').classList.remove('hidden');
  document.getElementById('btnReset').classList.remove('hidden');
  document.getElementById('msgB').innerHTML='';
  document.getElementById('resultBox').innerHTML='';
});

/* ---- 戻る ---- */
document.getElementById('btnBack').addEventListener('click',()=>{
  document.getElementById('card2').classList.add('hidden');
  document.getElementById('card1').classList.remove('hidden');
  document.getElementById('resultBox').innerHTML='';
});

/* ---- 計算 ---- */
document.getElementById('btnCalc').addEventListener('click',()=>{
  const a = parseVal(state.a);
  const b = parseVal(state.b);
  const {optimalBMods, bestBagCombos} = state.optimal;
  const res = computePlan(a,b,optimalBMods,bestBagCombos);
  const msgBox = document.getElementById('msgB');
  const resultBox = document.getElementById('resultBox');
  resultBox.innerHTML='';

  if(!res.ok){
    msgBox.innerHTML = `<div class="msg ${res.type==='warn'?'warn':'err'}">${res.c!==undefined?`空打ち額 ${res.c.toLocaleString('ja-JP')} 円 ／ `:''}${res.msg}</div>`;
    return;
  }
  msgBox.innerHTML='';
  let rows = '';
  for(const name in res.combo){
    rows += `<div class="row"><span>${name}</span><span class="c">${res.combo[name]} 個</span></div>`;
  }
  resultBox.innerHTML = `
    <div class="result">
      <h2>✅ 構成が見つかりました</h2>
      <div class="row"><span>空打ち額</span><span class="big">${res.c.toLocaleString('ja-JP')} 円</span></div>
      <div class="label" style="margin:10px 0 4px;">【購入内訳】</div>
      ${rows}
      <div class="total">合計点数：${res.total} 点</div>
    </div>`;
  resultBox.scrollIntoView({behavior:'smooth', block:'nearest'});
});

/* ---- リセット ---- */
document.getElementById('btnReset').addEventListener('click',()=>{
  state.a=''; state.b=''; state.optimal=null;
  document.getElementById('card2').classList.add('hidden');
  document.getElementById('card1').classList.remove('hidden');
  document.getElementById('btnReset').classList.add('hidden');
  document.getElementById('resultBox').innerHTML='';
  document.getElementById('msgB').innerHTML='';
  document.getElementById('condBox').innerHTML='';
  render();
});

/* 初期化 */
buildPad(document.getElementById('padA'),'a');
buildPad(document.getElementById('padB'),'b');
render();
</script>
</body>
</html>
